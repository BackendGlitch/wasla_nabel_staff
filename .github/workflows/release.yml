name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app (Windows)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release folder
        uses: actions/upload-artifact@v4
        with:
          name: staff-release-windows
          path: release/

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libudev-dev

      - name: Install dependencies
        run: npm ci

      - name: Build app (Linux)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux release folder
        uses: actions/upload-artifact@v4
        with:
          name: staff-release-linux
          path: release/

  release:
    needs: [build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: staff-release-windows
          path: artifacts/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: staff-release-linux
          path: artifacts/lin

      - name: Release (installers, AppImage, deb, auto-update metadata)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          files: |
            artifacts/win/**/latest.yml
            artifacts/lin/**/latest-linux.yml
            artifacts/win/**/*-Setup.exe
            artifacts/win/**/*.blockmap
            artifacts/lin/**/*.AppImage
            artifacts/lin/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
